<svg width="880" height="240" viewBox="0 0 880 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
    </style>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0,0,0,0)"/>
      <rect y="2" width="4" height="2" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>

  <rect width="880" height="240" fill="#0d1117"/>
  <rect width="880" height="240" fill="url(#scan)"/>

  <g opacity="0.45">
    <circle cx="80" cy="220" r="0.8" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="180" r="1.2" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="240" r="0.6" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="150" r="1" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="200" r="0.7" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="170" r="1.4" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="50" r="1" fill="#3fb950">
      <animate attributeName="cy" values="-10;260" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="30" r="0.5" fill="#3fb950">
      <animate attributeName="cy" values="-10;260" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="440" cy="60" r="0.9" fill="#3fb950">
      <animate attributeName="cy" values="-10;260" dur="16s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(440, 120)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      <g stroke="#3fb950" stroke-width="1.5" fill="none" opacity="0.25">
        <rect x="-55" y="-55" width="110" height="110"/>
        <rect x="-30" y="-30" width="110" height="110"/>
        <line x1="-55" y1="-55" x2="-30" y2="-30"/>
        <line x1="55" y1="-55" x2="80" y2="-30"/>
        <line x1="-55" y1="55" x2="-30" y2="80"/>
        <line x1="55" y1="55" x2="80" y2="80"/>
      </g>
      <g stroke="#3fb950" stroke-width="0.5" fill="none" opacity="0.1">
        <line x1="-55" y1="-20" x2="-30" y2="-5"/>
        <line x1="-55" y1="20" x2="-30" y2="35"/>
        <line x1="-20" y1="-55" x2="-5" y2="-30"/>
        <line x1="20" y1="-55" x2="35" y2="-30"/>
      </g>
    </g>
  </g>

  <text x="440" y="95" font-family="'Press Start 2P', 'Courier New', monospace" font-size="26" fill="#3fb950" text-anchor="middle" filter="url(#glow)">RODRIGO MARTINS</text>

  <text x="440" y="135" font-family="'Press Start 2P', 'Courier New', monospace" font-size="11" fill="#3fb950" text-anchor="middle" opacity="0.8">[ DEVELOPER ]</text>

  <text x="440" y="174" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">&gt; system ready for commands...</text>
  <rect x="318" y="162" width="7" height="13" fill="#3fb950">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
