<svg width="880" height="240" viewBox="0 0 880 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0,0,0,0)"/>
      <rect y="2" width="4" height="2" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>

  <rect width="880" height="240" fill="#0d1117"/>
  <rect width="880" height="240" fill="url(#scan)"/>

  <g opacity="0.5">
    <circle cx="80" cy="220" r="0.8" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="180" r="1.2" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="240" r="0.6" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="150" r="1" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="200" r="0.7" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="170" r="1.4" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="50" r="1" fill="#3fb950">
      <animate attributeName="cy" values="-10;260" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="30" r="0.5" fill="#3fb950">
      <animate attributeName="cy" values="-10;260" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="60" r="1.1" fill="#3fb950">
      <animate attributeName="cy" values="-10;260" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="40" r="0.9" fill="#3fb950">
      <animate attributeName="cy" values="-10;260" dur="19s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="120" r="0.6" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="28s" repeatCount="indefinite"/>
    </circle>
    <circle cx="440" cy="10" r="0.4" fill="#3fb950">
      <animate attributeName="cy" values="-10;260" dur="30s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="130" r="1.3" fill="#3fb950">
      <animate attributeName="cy" values="260;-10" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="100" r="0.7" fill="#3fb950">
      <animate attributeName="cy" values="-10;260" dur="17s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(130, 120)">
    <animateTransform attributeName="transform" type="rotate" from="0 130 120" to="360 130 120" dur="10s" repeatCount="indefinite"/>
    <g stroke="#3fb950" stroke-width="1.5" fill="none" opacity="0.35">
      <rect x="-45" y="-45" width="90" height="90"/>
      <rect x="-25" y="-25" width="90" height="90"/>
      <line x1="-45" y1="-45" x2="-25" y2="-25"/>
      <line x1="45" y1="-45" x2="65" y2="-25"/>
      <line x1="-45" y1="45" x2="-25" y2="65"/>
      <line x1="45" y1="45" x2="65" y2="65"/>
    </g>
  </g>

  <text x="440" y="95" font-family="'Courier New', monospace" font-size="38" font-weight="bold" fill="#3fb950" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
    RODRIGO MARTINS
    <animate attributeName="opacity" values="1;0.88;1" dur="4s" repeatCount="indefinite"/>
  </text>

  <text x="440" y="130" font-family="'Courier New', monospace" font-size="12" fill="#3fb950" text-anchor="middle" letter-spacing="4" opacity="0.7" filter="url(#glow2)">[ DEVELOPER ]</text>

  <text x="440" y="168" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">&gt; system ready for commands...</text>

  <rect x="318" y="157" width="7" height="13" fill="#3fb950">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
